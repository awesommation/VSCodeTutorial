<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weather Lookup</title>
    <!-- Load the Flask-specific stylesheet from the isolated static subfolder. -->
    <link rel="stylesheet" href="{{ url_for('static', filename='flask_weather/styles.css') }}" />
  </head>
  <body>
    <main class="page">
      <section class="weather-app">
        <h1>Current Weather</h1>

        <!-- City search form; POST requests are handled by the Flask index route. -->
        <form method="post" class="weather-form">
          <label for="city">Enter a city</label>
          <div class="input-group">
            <input
              id="city"
              name="city"
              type="text"
              value="{{ city }}"
              placeholder="e.g. London"
              required
            />
          </div>

          <label for="state">State / region (optional)</label>
          <div class="input-group">
            <input
              id="state"
              name="state"
              type="text"
              value="{{ state }}"
              placeholder="e.g. CA or Ontario"
            />
          </div>

          <label for="country">Country code (optional)</label>
          <div class="input-group">
            <input
              id="country"
              name="country"
              type="text"
              value="{{ country }}"
              placeholder="e.g. US or GB"
            />
          </div>

          <label for="units">Temperature units</label>
          <div class="input-group">
            <select id="units" name="units">
              <option value="metric" {% if units == 'metric' %}selected{% endif %}>Celsius</option>
              <option value="imperial" {% if units == 'imperial' %}selected{% endif %}>Fahrenheit</option>
            </select>
            <button type="submit">Search</button>
          </div>
        </form>

        <!-- Display an error message when the server returns a validation or lookup error. -->
        {% if error %}
          <p class="message error">{{ error }}</p>
        {% endif %}

        <!-- Render weather content only when a successful lookup has occurred. -->
        {% if weather %}
          <section class="weather-card">
            <div class="weather-header">
              <div>
                <p class="weather-location">{{ weather.city }}</p>
                <p class="weather-description">{{ weather.description }}</p>
              </div>
              <!-- Weather icons are served by OpenWeatherMap directly. -->
              <img src="{{ weather.icon_url }}" alt="Weather icon" />
            </div>
            <div class="weather-values">
              <span class="temperature">{{ weather.temperature }}{{ weather.unit_label }}</span>
              <span class="feels-like">Feels like {{ weather.feels_like }}{{ weather.unit_label }}</span>
            </div>
          </section>
        {% endif %}
      </section>
    </main>
  </body>
</html>
